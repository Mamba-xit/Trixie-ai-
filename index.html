<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trixie AI</title>
<style>
* {box-sizing: border-box;}
body {margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#0f0f0f; color:#fff; display:flex; flex-direction:column; height:100vh;}
.header {padding:16px; text-align:center; border-bottom:1px solid #2a2a2a; font-weight:600; font-size:18px; background:#0f0f0f;}
.header span {color:#a855f7;}
.clear {background:#2a2a2a; padding:6px 12px; font-size:13px; border:none; border-radius:6px; color:#fff; cursor:pointer; margin-left:10px;}
.clear:hover {background:#3a3a3a;}
#chat {flex:1; overflow-y:auto; padding:20px; max-width:800px; margin:0 auto; width:100%;}
.msg {margin:12px 0; padding:14px 16px; border-radius:14px; line-height:1.6; white-space:pre-wrap; word-wrap:break-word;}
.user {background:#2a2a2a; margin-left:15%;}
.ai {background:#7c3aed; margin-right:15%;}
#input-area {padding:16px 20px; border-top:1px solid #2a2a2a; background:#0f0f0f; display:flex; gap:10px; max-width:800px; margin:0 auto; width:100%;}
input {flex:1; padding:14px; border-radius:10px; border:1px solid #2a2a2a; background:#1a1a1a; color:#fff; font-size:15px; outline:none;}
input:focus {border-color:#7c3aed;}
button.send {padding:14px 24px; border-radius:10px; border:none; background:#7c3aed; color:#fff; cursor:pointer; font-size:15px; font-weight:600;}
button.send:hover {background:#9333ea;}
@media (max-width:600px) {
 .user {margin-left:5%;}
 .ai {margin-right:5%;}
</style>
</head>
<body>
<div class="header">
  Trixie AI <span>🦊</span>
  <button class="clear" onclick="clearChat()">Clear</button>
</div>
<div id="chat">
  {% for msg in history %}
    <div class="msg {{'user' if msg.role=='user' else 'ai'}}">{{msg.parts[0]}}</div>
  {% endfor %}
</div>
<div id="input-area">
  <input id="input" placeholder="Ask Trixie anything..." onkeypress="if(event.key==='Enter') send()">
  <button class="send" onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg) return;

  addMsg(msg, "user");
  input.value = "";

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: msg})
    });
    const data = await res.json();
    addMsg(data.reply, "ai");
  } catch(e) {
    addMsg("Error: Could not reach server", "ai");
  }
}

function addMsg(text, role) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function clearChat() {
  await fetch("/clear", {method:"POST"});
  document.getElementById("chat").innerHTML = "";
}
</script>
</body>
</html>
